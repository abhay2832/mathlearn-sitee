<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>SMS Bomber</title>
 <style>
 body {
 font-family: Arial, sans-serif;
 background-color: #f0f0f0;
 }
 
 .container {
 width: 500px;
 margin: 100px auto;
 padding: 20px;
 background-color: #fff;
 border-radius: 10px;
 box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
 }
 
 input[type="text"], input[type="number"] {
 width: 100%;
 height: 30px;
 margin-bottom: 10px;
 padding-left: 10px;
 }
 
 button {
 width: 100%;
 height: 30px;
 background-color: #4CAF50;
 color: #fff;
 cursor: pointer;
 }
 
 button:hover {
 background-color: #3e8e41;
 }
 </style>
</head>
<body>
 <div class="container">
 <h2>SMS Bomber</h2>
 <form id="smsForm">
 <label for="number">Enter Mobile Number:</label><br>
 <input type="text" id="number" name="number" placeholder="+123456789012"><br>
 
 <label for="count">Number of SMS:</label><br>
 <input type="number" id="count" name="count" value="10"><br>
 
 <button type="submit">Start Bombing</button>
 </form>
 
 <div id="status"></div>
 </div>

 <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

 <script>
 $(document).ready(function() {
 $('#smsForm').submit(function(e) {
 e.preventDefault();
 var number = $('#number').val();
 var count = $('#count').val();

 if (number.length > 6 && !isNaN(count)) {
 $.ajax({
 type: 'POST',
 url: 'sms.php', // Change to your PHP file URL
 data: {number:number, count:count},
 success:function(response) {
 $('#status').html('Bombed '+count+' SMS successfully!');
 },
 error:function() {
 $('#status').html('Failed! Check your server.');
 }
 });
 } else {
 $('#status').html('Invalid input!');
 }
 
 // Clear form after submission
 this.reset();
 return false; 
 });
 });
 </script>

</body>
</html>
