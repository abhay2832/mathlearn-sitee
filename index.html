<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math World Ultimate Pro</title>
    <style>
        :root { --p: #4f46e5; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Navigation System */
        .page { display: none; padding: 15px; }
        .active { display: block; }
        
        /* Premium UI Components */
        header { background: var(--p); color: white; padding: 20px; text-align: center; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.96); }
        
        /* Functional Inputs */
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* Scratchpad */
        #pad { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99; }
    </style>
</head>
<body>

<header>MATH WORLD ULTIMATE PRO</header>

<div id="home" class="page active">
    <div class="grid">
        <div class="card" onclick="nav('tables')">✖️<br>Tables</div>
        <div class="card" onclick="nav('exam')">📂<br>Exam Prep</div>
        <div class="card" onclick="nav('biz')">💼<br>GST/Profit</div>
        <div class="card" onclick="nav('quiz')">⏱️<br>Speed Quiz</div>
        <div class="card" onclick="nav('formula')">📜<br>Formulas</div>
        <div class="card" onclick="togglePad()">✏️<br>Scratchpad</div>
    </div>
</div>

<div id="tables" class="page">
    <button onclick="nav('home')">← Back</button>
    <input type="number" id="t-num" placeholder="Search Table (e.g. 19)">
    <button class="btn-main" onclick="showTable()">Generate Table</button>
    <div id="t-res" style="margin-top:15px; background:white; padding:15px; border-radius:10px;"></div>
</div>

<div id="exam" class="page">
    <button onclick="nav('home')">← Back</button>
    <h3>Previous Year Papers</h3>
    <div class="card">Army GD 2025 - Set A</div>
    <div class="card">UP Police 2024 - Math</div>
</div>

<div id="biz" class="page">
    <button onclick="nav('home')">← Back</button>
    <h3>GST & Profit</h3>
    <input type="number" id="p1" placeholder="Price">
    <input type="number" id="p2" placeholder="GST %">
    <button class="btn-main" onclick="calcBiz()">Calculate</button>
    <div id="b-res" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div id="quiz" class="page">
    <button onclick="nav('home')">← Back</button>
    <h3>Speed Drill (60s)</h3>
    <div id="q-text" style="font-size:2rem; text-align:center; margin:20px;">15 * 12 = ?</div>
    <input type="number" id="q-in" placeholder="Answer">
    <button class="btn-main" onclick="check()">Submit</button>
</div>

<div id="formula" class="page">
    <button onclick="nav('home')">← Back</button>
    <h3>Formula Sheet</h3>
    <div class="card">Circle Area: πr²</div>
    <div class="card">Profit: SP - CP</div>
    <button class="btn-main" onclick="alert('PDF Exported!')">Download PDF</button>
</div>

<div id="pad"><button onclick="togglePad()" style="color:white; background:red;">Close</button><canvas id="cnv"></canvas></div>

<script>
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showTable() {
        let n = document.getElementById('t-num').value;
        let res = "";
        for(let i=1; i<=50; i++) res += `${n} x ${i} = ${n*i} <br>`;
        document.getElementById('t-res').innerHTML = res;
    }

    function calcBiz() {
        let p = document.getElementById('p1').value;
        let g = document.getElementById('p2').value;
        document.getElementById('b-res').innerText = "Total: " + (p * (1 + g/100)).toFixed(2);
    }

    function check() {
        let val = document.getElementById('q-in').value;
        alert(val == 180 ? "Correct!" : "Wrong! Review Mistake.");
    }

    function togglePad() {
        let p = document.getElementById('pad');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
